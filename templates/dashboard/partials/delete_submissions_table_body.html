{% for author in author_list %}
  {% for paper in author.papers %}
  <tr class="hover:bg-red-50 transition text-sm">
    <td class="p-3 text-center">
      <input type="checkbox" name="selected_papers" value="{{ paper.id }}" class="form-checkbox h-4 w-4 text-red-600">
    </td>
    <td class="p-3 font-medium text-gray-900 text-center">{{ author.name }}</td>
    <td class="p-3 text-gray-700 text-center">{{ author.email }}</td>
    <td class="p-3 text-gray-700 text-center">
      <div class="max-w-md truncate" title="{{ paper.title }}">{{ paper.title }}</div>
    </td>
    <td class="p-3 text-gray-700 text-center">
      <span class="font-mono text-blue-700 font-semibold">{{ paper.paper_id }}</span>
    </td>
    {% comment %} <td class="p-3 text-center">
      <form method="post" style="display: inline;" onsubmit="return confirm('Are you sure you want to delete this paper: {{ paper.title }}?');">
        {% csrf_token %}
        <input type="hidden" name="delete_paper_id" value="{{ paper.id }}">
        <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs font-medium transition">
          <i class="fas fa-trash mr-1"></i>Delete Paper
        </button>
      </form>
    </td> {% endcomment %}
  </tr>
  {% endfor %}
{% empty %}
<tr><td colspan="6" class="p-4 text-gray-500 text-center">No papers found.</td></tr>
{% endfor %}
